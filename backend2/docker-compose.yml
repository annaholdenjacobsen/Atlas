services:
  postgres:
    image: postgres:16
    container_name: atlas-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas_db
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

